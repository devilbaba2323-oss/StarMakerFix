name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Tweak
        uses: Randomblock1/theos-action@v1
        with:
          args: make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: StarMakerFix
          path: packages/*.deb
