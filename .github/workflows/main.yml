name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: theos/theos:latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          make package
        env:
          THEOS: /theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarMakerFix
          path: packages/*.deb
