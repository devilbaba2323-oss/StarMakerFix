name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          $THEOS/bin/make package
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarMakerFix
          path: packages/*.deb
