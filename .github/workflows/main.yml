- name: Setup Theos
        run: |
          # Install Theos
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          
          # Install Toolchain (using a direct, stable link)
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain/linux
          curl -L https://github.com/theos/toolchain/releases/download/v0.1/linux.tar.gz -o toolchain.tar.gz
          tar -xzf toolchain.tar.gz -C $GITHUB_WORKSPACE/theos/toolchain/linux --strip-components=1
          
          # Install SDKs (using a direct, stable link)
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz -o sdks.tar.gz
          tar -xzf sdks.tar.gz -C $GITHUB_WORKSPACE/theos/sdks --strip-components=1
