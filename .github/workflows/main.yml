name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Compile Tweak
        run: |
          # Use a simple dummy build command if Theos isn't fully linked
          # This will at least show us if the Makefile is being read
          make package
        continue-on-error: true

      - name: Debug Folder Contents
        run: ls -R

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuildOutput
          path: |
            *.deb
            packages/*.deb
