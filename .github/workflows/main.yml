name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          # Download the Toolchain (Fixes the "clang not found" error)
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain/linux/iphone
          curl -L https://github.com/theos/toolchain-linux/releases/latest/download/linux-iphone-clang.tar.gz | tar -xz -C $GITHUB_WORKSPACE/theos/toolchain/linux/iphone --strip-components=1
          
          # Setup SDKs
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/master.tar.gz
          tar -xzf master.tar.gz -C $GITHUB_WORKSPACE/theos/sdks --strip-components=1

      - name: Build Tweak
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          export PATH
          
